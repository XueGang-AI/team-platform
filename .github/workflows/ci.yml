name: CI

on:
  push:
    branches: [main]
  pull_request:

# CI：
# - quality：格式 / Lint / 类型检查 / 单元测试 / 构建（无需外部服务）
# - integration：集成测试（PostgreSQL + Redis service containers）
# 两个 job 并行执行，均不部署、不发布、不提交、不使用生产密钥。
jobs:
  quality:
    name: Format · Lint · Typecheck · Unit · Build
    runs-on: ubuntu-latest
    env:
      # turbo 的 lint/typecheck/test/build 均声明 dependsOn: ["^build"]，
      # 会触发 apps/api 的 build（先 prisma generate 再 nest build）。
      # prisma generate 读取 prisma.config.ts 中的 env('DATABASE_URL')，
      # 需要该变量存在；generate 不连接数据库，占位值即可。
      # 真实数据库连接在下方 integration job 中提供。
      DATABASE_URL: postgresql://team_platform:team_platform@localhost:5432/team_platform?schema=public
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.7.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # 生成 Prisma 客户端：lint/typecheck/test 引用生成的 client 类型，
      # turbo ^build 只构建 packages 不触发 apps/api 自身的 prisma generate，故显式生成。
      - name: Generate Prisma client
        run: pnpm --filter @team-platform/api db:generate

      - name: Format check
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test

      - name: Build
        run: pnpm build

  integration:
    name: Integration tests
    runs-on: ubuntu-latest
    # service containers 在 job 层级定义，端口发布到 runner 宿主，
    # 步骤内通过 localhost:<port> 访问。
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: team_platform
          POSTGRES_PASSWORD: team_platform
          # service container 自动创建 team_platform 库；集成测试通过 DATABASE_URL 连接它。
          POSTGRES_DB: team_platform
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U team_platform -d team_platform"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://team_platform:team_platform@localhost:5432/team_platform?schema=public
      REDIS_URL: redis://localhost:6379
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.7.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # 生成 Prisma 客户端：turbo ^build 只构建 packages 不触发 apps/api 自身的 prisma generate，故显式生成。
      - name: Generate Prisma client
        run: pnpm --filter @team-platform/api db:generate

      # 集成测试连接 DATABASE_URL 指向的 team_platform 主库（service container 已自动创建），无需单独建测试库。
      - name: Integration tests
        run: pnpm test:integration
